<nav class="navbar">
  <div class="nav-inner container">
    <a routerLink="/" class="brand">
      <span class="brand-name">CHANIEL DELUXE</span>
    </a>

    <button class="hamburger" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-links" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen=false">Inicio</a>
      <a routerLink="/catalogo" routerLinkActive="active" (click)="menuOpen=false">Catálogo</a>

      @if(auth.isLoggedIn()) {
        @if(!auth.isAdmin()) {
          <a routerLink="/carrito" routerLinkActive="active" class="cart-link" (click)="menuOpen=false">
            Carrito
            @if(carrito.count() > 0) {
              <span class="cart-badge">{{carrito.count()}}</span>
            }
          </a>
          <a routerLink="/mis-pedidos" routerLinkActive="active" (click)="menuOpen=false">Mis Pedidos</a>
        }
        @if(auth.isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active" (click)="menuOpen=false">Panel Admin</a>
        }
        <div class="user-menu">
          <span class="user-name">{{auth.currentUser()?.nombre}}</span>
          <button class="btn-logout" (click)="logout()">Salir</button>
        </div>
      } @else {
        <a routerLink="/login" class="btn-nav-login" (click)="menuOpen=false">Iniciar Sesión</a>
        <a routerLink="/registro" class="btn-nav-reg" (click)="menuOpen=false">Crear Cuenta</a>
      }
    </div>
  </div>
</nav>
